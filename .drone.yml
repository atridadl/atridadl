kind: pipeline
type: docker
name: default

steps:
- name: build
  image: node
  environment:
    CLOUDRON_URL:
      from_secret: CLOUDRON_URL
    CLOUDRON_USERNAME:
      from_secret: CLOUDRON_USERNAME
    CLOUDRON_PASSWORD:
      from_secret: CLOUDRON_PASSWORD
    BUILD_URL:
      from_secret: BUILD_URL
    BUILD_TOKEN:
      from_secret: BUILD_TOKEN
  commands:
  - cd atridad
  - npm i -g cloudron
  - cloudron login --username $CLOUDRON_USERNAME --password $CLOUDRON_PASSWORD $CLOUDRON_URL
  - cloudorn build --set-build-service $BUILD_URL --build-service-token $BUILD_TOKEN