kind: pipeline
type: docker
name: default

steps:
- name: nuxt
  image: node
  commands:
  - cd atridad
  - yarn
  - yarn build

- name: docker
  image: docker:dind
  environment:
    DOCKER_USERNAME:
      from_secret: DOCKER_USERNAME
    DOCKER_TOKEN:
      from_secret: DOCKER_TOKEN
  volumes:
  - name: dockersock
    path: /var/run/docker.sock
  commands:
  - docker login --username $DOCKER_USERNAME --password $DOCKER_TOKEN
  - docker build -t atridadl/atridad .
  - docker push atridadl/atridad

- name: cloudron
  image: node
  environment:
    CLOUDRON_URL:
      from_secret: CLOUDRON_URL
    CLOUDRON_USERNAME:
      from_secret: CLOUDRON_USERNAME
    CLOUDRON_PASSWORD:
      from_secret: CLOUDRON_PASSWORD
    SITE_URL:
      from_secret: SITE_URL
  commands:
  - npm i -g cloudron
  - cloudron login --username $CLOUDRON_USERNAME --password $CLOUDRON_PASSWORD $CLOUDRON_URL
  - cloudron update --image atridadl/atridad --app $SITE_URL

volumes:
- name: dockersock
  host:
    path: /var/run/docker.sock